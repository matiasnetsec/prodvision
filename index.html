<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Prodvision</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="appbar">
    <div class="appbar-content">
      <svg class="appbar-logo" viewBox="0 0 32 32" width="28" height="28" fill="none">
        <circle cx="16" cy="16" r="14" stroke="url(#g1)" stroke-width="2.5"/>
        <path d="M10 20 L16 8 L22 20" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="10" cy="20" r="2" fill="#00e5ff"/>
        <circle cx="22" cy="20" r="2" fill="#00e5ff"/>
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32">
            <stop offset="0%" stop-color="#00e5ff"/>
            <stop offset="100%" stop-color="#7c4dff"/>
          </linearGradient>
        </defs>
      </svg>
      <h1>Prodvision</h1>
      <button id="btnNavRelatorio" class="btn-icon" title="Relatórios">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </button>
      <button id="btnLimpar" class="btn-icon" title="Limpar tudo">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
  </header>

  <main id="mainContent">
    <div class="main-layout">
      <div class="main-col-left">
        <div id="maquinasContainer"></div>
        <button id="btnRelatorio" class="btn-enviar">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Enviar Relatório
        </button>
        <div id="emptyState">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <p>Nenhuma máquina cadastrada</p>
          <p class="empty-sub">Toque no botão + para adicionar</p>
        </div>
      </div>
      <div class="main-col-right" id="logContainer">
        <div class="log-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Log de Turno
        </div>
        <div class="log-form">
          <select id="logMaquina" class="log-input"><option value="">Selecione a máquina</option></select>
          <div class="log-row">
            <select id="logStatus" class="log-input log-half">
              <option value="parada">Parada</option>
              <option value="setup">Setup</option>
              <option value="manutencao">Manutenção</option>
              <option value="rodando">Rodando</option>
            </select>
          </div>
          <div class="log-row">
            <input type="time" id="logHoraInicio" class="log-input log-half" placeholder="Início">
            <input type="time" id="logHoraFim" class="log-input log-half" placeholder="Fim">
          </div>
          <input type="text" id="logObservacao" class="log-input" placeholder="Observação">
          <button id="btnLogSalvar" class="btn-salvar" style="width:100%;margin-top:6px;text-align:center">Registrar</button>
        </div>
      </div>
    </div>
  </main>

  <button id="fabAdicionar" class="fab" title="Adicionar máquina">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <div id="loginOverlay">
    <div class="login-box">
      <div class="login-logo">
        <svg viewBox="0 0 32 32" width="48" height="48" fill="none">
          <circle cx="16" cy="16" r="14" stroke="url(#g1)" stroke-width="2.5"/>
          <path d="M10 20 L16 8 L22 20" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="10" cy="20" r="2" fill="#00e5ff"/>
          <circle cx="22" cy="20" r="2" fill="#00e5ff"/>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#00e5ff"/>
              <stop offset="100%" stop-color="#7c4dff"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h2 class="login-title">Prodvision</h2>
      <p class="login-sub">Monitoramento de Máquinas</p>
      <div class="login-form">
        <input type="text" id="loginUsername" class="login-input" placeholder="Usuário" autocomplete="username">
        <input type="password" id="loginSenha" class="login-input" placeholder="Senha" autocomplete="current-password">
        <button id="btnLogin" class="login-btn">Entrar</button>
        <p id="loginError" class="login-error"></p>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
