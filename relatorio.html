<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Relatórios - Prodvision</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="appbar">
    <div class="appbar-content">
      <svg class="appbar-logo" viewBox="0 0 32 32" width="28" height="28" fill="none">
        <circle cx="16" cy="16" r="14" stroke="url(#g1)" stroke-width="2.5"/>
        <path d="M10 20 L16 8 L22 20" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="10" cy="20" r="2" fill="#00e5ff"/>
        <circle cx="22" cy="20" r="2" fill="#00e5ff"/>
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32">
            <stop offset="0%" stop-color="#00e5ff"/>
            <stop offset="100%" stop-color="#7c4dff"/>
          </linearGradient>
        </defs>
      </svg>
      <h1>Relatórios</h1>
      <button id="btnVoltar" class="btn-icon" title="Voltar">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
    </div>
  </header>

  <main id="mainContent">
    <div id="relatoriosContent"></div>
  </main>

  <script src="js/relatorio.js"></script>
</body>
</html>
